trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  TEST_MODE: 'smoke'
  DOCKER_COMPOSE_FILE: '$(Build.SourcesDirectory)/.docker/compose/quality-gates.yml'
  DOCKER_ENV_FILE: '$(Agent.TempDirectory)/.env.api-read'

steps:
  - checkout: self

  - task: UseDotNet@2
    displayName: 'Use .NET 10 SDK'
    inputs:
      packageType: sdk
      version: '10.0.x'

  - task: NodeTool@0
    displayName: 'Use Node 22'
    inputs:
      versionSpec: '22.x'

  - script: dotnet test api/Beers.API.sln --nologo
    displayName: 'Run unit baseline'

  - script: |
      chmod +x tests/api-read/scripts/*.sh
      cat > "$(DOCKER_ENV_FILE)" <<EOF
      KeyVault__VaultUri=$(KeyVault__VaultUri)
      AutoMapperLicenseKey=$(AutoMapperLicenseKey)
      AZURE_TENANT_ID=$(AZURE_TENANT_ID)
      AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET=$(AZURE_CLIENT_SECRET)
      TEST_MODE=$(TEST_MODE)
      EOF
      tests/api-read/scripts/run-api-read-suite.sh
    displayName: 'Run API read test suite'
    env:
      TEST_MODE: $(TEST_MODE)
      KeyVault__VaultUri: $(KeyVault__VaultUri)
      AutoMapperLicenseKey: $(AutoMapperLicenseKey)
      AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
